<!-- COCOMITalk - COCOMI Family AI会話アプリ -->
<!-- v1.2 デバッグパネル追加（設定画面バグ調査用・修正後削除） -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B9D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>COCOMITalk</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="meeting-styles.css">
</head>
<body>

  <!-- デバッグパネル（JSエラーを画面上部に赤字表示・原因特定したら削除） -->
  <div id="dbg" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#1a1a2e;color:#F44336;font-size:12px;padding:8px;max-height:35vh;overflow:auto;font-family:monospace;white-space:pre-wrap;border-bottom:3px solid #F44336;">
    <b style="color:#FF6B9D">🔍デバッグ</b>
    <button onclick="this.parentElement.style.display='none'" style="float:right;background:#333;color:#fff;border:none;padding:2px 8px;border-radius:4px">✕</button>
    <div id="dbg-log"></div>
  </div>
  <script>
  (function(){
    var p=document.getElementById('dbg'),l=document.getElementById('dbg-log');
    window._dbg=function(m){p.style.display='block';l.textContent+='\n'+m;};
    window.onerror=function(msg,src,line){window._dbg('❌ '+(src?src.split('/').pop():'?')+':'+line+' → '+msg);};
    window.addEventListener('unhandledrejection',function(e){window._dbg('❌ Promise: '+e.reason);});
  })();
  </script>

  <!-- ========== スプラッシュ画面 ========== -->
  <div id="splash-screen" class="splash">
    <div class="splash-content">
      <div class="splash-logo">🎙️</div>
      <h1 class="splash-title">COCOMITalk</h1>
      <p class="splash-subtitle">COCOMI Family と話そう</p>
      <div class="splash-dots">
        <span class="dot dot-koko"></span>
        <span class="dot dot-gpt"></span>
        <span class="dot dot-claude"></span>
      </div>
    </div>
  </div>

  <!-- ========== メインアプリ ========== -->
  <div id="app" class="app hidden">
    <header class="app-header">
      <div class="header-left">
        <span class="header-logo">🎙️</span>
        <span class="header-title">COCOMITalk</span>
      </div>
      <div class="header-right">
        <button id="btn-mode" class="mode-btn" data-mode="normal" aria-label="モード切替">💬 普段</button>
        <button id="btn-people" class="people-btn" data-people="solo" aria-label="人数切替" title="1対1モード">👤</button>
        <button id="btn-settings" class="icon-btn" aria-label="設定">⚙️</button>
      </div>
    </header>
    <nav class="sister-tabs">
      <button class="tab active" data-sister="koko">
        <span class="tab-icon">🌸</span>
        <span class="tab-name">ここちゃん</span>
      </button>
      <button class="tab" data-sister="gpt">
        <span class="tab-icon">🌙</span>
        <span class="tab-name">お姉ちゃん</span>
      </button>
      <button class="tab" data-sister="claude">
        <span class="tab-icon">🔮</span>
        <span class="tab-name">クロちゃん</span>
      </button>
    </nav>
    <main id="chat-area" class="chat-area">
      <div id="welcome-msg" class="welcome">
        <div class="welcome-icon">🌸</div>
        <p class="welcome-text">ここちゃんとお話ししよう！</p>
        <p class="welcome-hint">下のメッセージ欄に話しかけてね</p>
      </div>
    </main>
    <footer class="input-area">
      <div id="doc-gen-status" class="doc-gen-status hidden"></div>
      <div id="file-preview" class="file-preview hidden"></div>
      <div class="input-wrapper">
        <button id="btn-attach" class="btn-attach" aria-label="ファイル添付" title="📎 ファイルを添付">
          <span>📎</span>
        </button>
        <input type="file" id="file-input" class="hidden" accept=".md,.txt,.js,.json,.css,.html,.csv,.yml,.yaml,.xml,.py,.sh,.toml,.jpg,.jpeg,.png,.webp,.gif">
        <textarea id="msg-input" class="msg-input" placeholder="メッセージを入力..." rows="1" maxlength="4000"></textarea>
        <button id="btn-send" class="btn-send" aria-label="送信" disabled>
          <span class="send-arrow">↑</span>
        </button>
        <button id="btn-continue-talk" class="btn-continue-talk hidden" aria-label="みんなで話して" title="姉妹たちだけで会話を続ける">
          <span>🔄</span>
        </button>
      </div>
      <div class="input-footer">
        <span id="model-indicator" class="model-indicator">Gemini 2.5 Flash</span>
        <button id="btn-generate-doc" class="btn-download" aria-label="指示書生成" title="📋 指示書を自動生成">📋</button>
        <button id="btn-download" class="btn-download" aria-label="会話を保存" title="💾 会話をダウンロード">💾</button>
        <span id="token-cost" class="token-cost" title="今月のトークン使用量">--</span>
        <span id="char-count" class="char-count"></span>
      </div>
    </footer>
  </div>

  <!-- ========== 会議専用画面 ========== -->
  <div id="meeting-screen" class="meeting-screen hidden">
    <header class="meeting-header">
      <div class="header-left">
        <span class="header-logo">🏛️</span>
        <span class="header-title">COCOMITalk 会議室</span>
      </div>
      <div class="header-right">
        <button id="btn-meeting-archive" class="icon-btn" aria-label="過去の会議" title="過去の会議">📂</button>
        <button id="btn-meeting-minutes" class="icon-btn" aria-label="議事録DL" title="議事録DL" disabled>📝</button>
        <button id="btn-meeting-doc" class="icon-btn" aria-label="指示書生成" title="指示書生成" disabled>📋</button>
        <button id="btn-meeting-end" class="icon-btn" aria-label="会議終了">✕</button>
      </div>
    </header>
    <main class="meeting-chat"></main>
    <div id="meeting-archive" class="meeting-archive hidden">
      <div class="archive-header">
        <h2>📂 過去の会議</h2>
        <button id="btn-archive-close" class="icon-btn" aria-label="閉じる">✕</button>
      </div>
      <div id="archive-list" class="archive-list">
        <p class="archive-empty">まだ会議の記録がありません</p>
      </div>
    </div>
    <footer class="meeting-input-area">
      <div class="input-wrapper">
        <textarea class="meeting-topic-input" placeholder="議題を入力してください..." rows="1" maxlength="2000"></textarea>
        <button id="btn-meeting-start" class="btn-send" aria-label="会議開始">
          <span class="send-arrow">▶</span>
        </button>
      </div>
      <div class="meeting-actions hidden">
        <button id="btn-meeting-continue" class="meeting-action-btn">🔄 もう1ラウンド</button>
      </div>
    </footer>
  </div>

  <!-- ========== 設定モーダル ========== -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>⚙️ 設定</h2>
        <button id="btn-close-settings" class="icon-btn">✕</button>
      </div>
      <div class="modal-body">
        <section class="settings-section">
          <h3>🔑 認証</h3>
          <div class="setting-item">
            <label for="key-gemini">COCOMI認証トークン</label>
            <input type="password" id="key-gemini" placeholder="cocomi-...">
            <p class="setting-hint">Worker経由で全API共通の認証トークン</p>
          </div>
        </section>
        <section class="settings-section">
          <h3>🤖 モデル設定</h3>
          <div id="model-settings-area"></div>
          <button id="btn-reset-models" class="btn-secondary" style="margin-top:12px;">デフォルトに戻す</button>
        </section>
        <button id="btn-save-settings" class="btn-primary">保存する</button>
        <section class="settings-section" style="margin-top:24px;">
          <h3>🗑️ 会話履歴</h3>
          <button id="btn-clear-history" class="btn-danger">全ての会話履歴をクリア</button>
        </section>
        <section class="settings-section" style="margin-top:24px;">
          <h3>📊 トークン使用量</h3>
          <div id="token-detail-area">読み込み中...</div>
          <button id="btn-clear-tokens" class="btn-danger" style="margin-top:12px;">使用量データをリセット</button>
        </section>
      </div>
    </div>
  </div>

  <!-- スクリプト読み込み -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="prompts/koko-system.js"></script>
  <script src="prompts/gpt-system.js"></script>
  <script src="prompts/claude-system.js"></script>
  <script src="api-common.js"></script>
  <script src="api-gemini.js"></script>
  <script src="api-openai.js"></script>
  <script src="api-claude.js"></script>
  <script src="chat-history.js"></script>
  <script src="token-monitor.js"></script>
  <script src="file-handler.js"></script>
  <script src="doc-generator.js"></script>
  <script src="mode-switcher.js"></script>
  <script src="meeting-router.js"></script>
  <script src="meeting-history.js"></script>
  <script src="meeting-relay.js"></script>
  <script src="meeting-ui.js"></script>
  <script src="meeting-archive-ui.js"></script>
  <script src="chat-group.js"></script>
  <script src="chat-core.js"></script>
  <script src="app.js"></script>

  <!-- デバッグ: 3秒後に状態チェック -->
  <script>
  setTimeout(function(){
    var m='📋状態: ';
    m+='App='+(typeof App!=='undefined'?'OK':'NG');
    m+=' modal='+(document.getElementById('settings-modal')?'あり('+document.getElementById('settings-modal').className+')':'なし');
    m+=' btn='+(document.getElementById('btn-settings')?'あり':'なし');
    if(window._dbg)window._dbg(m); else alert(m);
  },3000);
  </script>
</body>
</html>
