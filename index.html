<!-- COCOMITalk - COCOMI Family AI会話アプリ -->
<!-- このファイルはアプリのメインHTML。スプラッシュ画面とチャットUIを含む -->
<!-- v0.1 Session A - 基盤構築 -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B9D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>COCOMITalk</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
  <!-- Google Fonts - 温かみのある日本語フォント -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ========== スプラッシュ画面 ========== -->
  <div id="splash-screen" class="splash">
    <div class="splash-content">
      <div class="splash-logo">🎙️</div>
      <h1 class="splash-title">COCOMITalk</h1>
      <p class="splash-subtitle">COCOMI Family と話そう</p>
      <div class="splash-dots">
        <span class="dot dot-koko"></span>
        <span class="dot dot-gpt"></span>
        <span class="dot dot-claude"></span>
      </div>
    </div>
  </div>

  <!-- ========== メインアプリ ========== -->
  <div id="app" class="app hidden">

    <!-- ヘッダー -->
    <header class="app-header">
      <div class="header-left">
        <span class="header-logo">🎙️</span>
        <span class="header-title">COCOMITalk</span>
      </div>
      <div class="header-right">
        <button id="btn-settings" class="icon-btn" aria-label="設定">⚙️</button>
      </div>
    </header>

    <!-- 三姉妹タブ -->
    <nav class="sister-tabs">
      <button class="tab active" data-sister="koko">
        <span class="tab-icon">🌸</span>
        <span class="tab-name">ここちゃん</span>
      </button>
      <button class="tab" data-sister="gpt">
        <span class="tab-icon">🌙</span>
        <span class="tab-name">お姉ちゃん</span>
      </button>
      <button class="tab" data-sister="claude">
        <span class="tab-icon">🔮</span>
        <span class="tab-name">クロちゃん</span>
      </button>
    </nav>

    <!-- チャットエリア -->
    <main id="chat-area" class="chat-area">
      <!-- ウェルカムメッセージ（初回表示） -->
      <div id="welcome-msg" class="welcome">
        <div class="welcome-icon">🌸</div>
        <p class="welcome-text">ここちゃんとお話ししよう！</p>
        <p class="welcome-hint">下のメッセージ欄に話しかけてね</p>
      </div>
      <!-- メッセージはここに動的に追加される -->
    </main>

    <!-- 入力エリア -->
    <footer class="input-area">
      <div class="input-wrapper">
        <textarea
          id="msg-input"
          class="msg-input"
          placeholder="メッセージを入力..."
          rows="1"
          maxlength="4000"
        ></textarea>
        <button id="btn-send" class="btn-send" aria-label="送信" disabled>
          <span class="send-arrow">↑</span>
        </button>
      </div>
      <div class="input-footer">
        <span id="model-indicator" class="model-indicator">Gemini 2.5 Flash</span>
        <span id="char-count" class="char-count"></span>
      </div>
    </footer>

  </div>

  <!-- ========== 設定モーダル ========== -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>⚙️ 設定</h2>
        <button id="btn-close-settings" class="icon-btn">✕</button>
      </div>
      <div class="modal-body">
        <!-- APIキー設定 -->
        <section class="settings-section">
          <h3>🔑 APIキー</h3>
          <div class="setting-item">
            <label for="key-gemini">Gemini API Key</label>
            <input type="password" id="key-gemini" placeholder="AIza...">
          </div>
          <div class="setting-item">
            <label for="key-openai">OpenAI API Key</label>
            <input type="password" id="key-openai" placeholder="sk-...">
          </div>
          <div class="setting-item">
            <label for="key-claude">Claude API Key</label>
            <input type="password" id="key-claude" placeholder="sk-ant-...">
          </div>
        </section>
        <!-- モデル設定 -->
        <section class="settings-section">
          <h3>🤖 モデル設定</h3>
          <div class="setting-item">
            <label for="routing-mode">ルーティングモード</label>
            <select id="routing-mode">
              <option value="auto">スマートルーティング（自動）</option>
              <option value="flash">Gemini Flash（最安）</option>
              <option value="balanced">Gemini 2.5 Flash（バランス）</option>
              <option value="quality">高品質モード</option>
            </select>
          </div>
        </section>
        <!-- 保存ボタン -->
        <button id="btn-save-settings" class="btn-primary">保存する</button>
      </div>
    </div>
  </div>

  <!-- スクリプト読み込み -->
  <script src="prompts/koko-system.js"></script>
  <script src="api-gemini.js"></script>
  <script src="chat-core.js"></script>
  <script src="app.js"></script>
</body>
</html>
