# COCOMI CI - COCOMITalk品質チェック
# 全COCOMIリポ共通のCI基盤（cocomi-ci.yml v1.1準拠）
# v1.0 - 初期配置
# v1.2 - 2026-03-08 LINE通知step追加

name: COCOMI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 500行制限チェック（COCOMI全リポ共通ルール）
      - name: 500行制限チェック
        run: |
          echo "=== 500行制限チェック ==="
          OVER_LIMIT=0
          for file in $(find . -name "*.js" -o -name "*.html" -o -name "*.css" | grep -v node_modules | grep -v .github); do
            LINES=$(wc -l < "$file")
            if [ "$LINES" -gt 500 ]; then
              echo "❌ $file: ${LINES}行（500行超過！）"
              OVER_LIMIT=1
            else
              echo "✅ $file: ${LINES}行"
            fi
          done
          if [ "$OVER_LIMIT" -eq 1 ]; then
            echo "::error::500行を超えるファイルがあります。分割してください。"
            exit 1
          fi
          echo "✅ 全ファイル500行以内"

      # 2. 先頭コメントチェック（日本語で「このファイルは何をするか」）
      - name: 先頭コメントチェック
        run: |
          echo "=== 先頭コメントチェック ==="
          MISSING=0
          for file in $(find . -name "*.js" | grep -v node_modules | grep -v .github | grep -v sw.js); do
            HEAD=$(head -5 "$file")
            if echo "$HEAD" | grep -qE "(このファイルは|COCOMITalk)"; then
              echo "✅ $file"
            else
              echo "⚠️ $file: 先頭に日本語コメントがありません"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "::warning::先頭に日本語コメントが無いファイルがあります"
          fi

      # 3. バージョン番号チェック
      - name: バージョン番号チェック
        run: |
          echo "=== バージョン番号チェック ==="
          for file in $(find . -name "*.js" | grep -v node_modules | grep -v .github | grep -v sw.js); do
            if grep -qE "v[0-9]+\.[0-9]+" "$file"; then
              VER=$(grep -oE "v[0-9]+\.[0-9]+" "$file" | head -1)
              echo "✅ $file: $VER"
            else
              echo "⚠️ $file: バージョン番号が見つかりません"
            fi
          done

      # 4. console.log検出（デバッグ残りチェック）
      - name: console.log検出
        run: |
          echo "=== console.log検出（情報のみ） ==="
          COUNT=0
          for file in $(find . -name "*.js" | grep -v node_modules | grep -v .github); do
            LOGS=$(grep -c "console\.log" "$file" 2>/dev/null || echo 0)
            if [ "$LOGS" -gt 0 ]; then
              echo "📝 $file: console.log ${LOGS}件"
              COUNT=$((COUNT + LOGS))
            fi
          done
          echo "合計: ${COUNT}件のconsole.log（本番前に要確認）"

      # 5. TODO/FIXME検出
      - name: TODO/FIXME検出
        run: |
          echo "=== TODO/FIXME検出 ==="
          grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.js" --include="*.html" --include="*.css" . --exclude-dir=node_modules --exclude-dir=.github || echo "✅ TODO/FIXMEなし"

      # 6. ファイル行数サマリー
      - name: ファイル行数サマリー
        run: |
          echo "=== ファイル行数サマリー ==="
          TOTAL=0
          for file in $(find . -name "*.js" -o -name "*.html" -o -name "*.css" | grep -v node_modules | grep -v .github | sort); do
            LINES=$(wc -l < "$file")
            printf "  %4d行  %s\n" "$LINES" "$file"
            TOTAL=$((TOTAL + LINES))
          done
          echo "---"
          echo "合計: ${TOTAL}行"

      # 7. LINE通知（成功時）
      - name: LINE通知（成功）
        if: success()
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          REPO_NAME="${{ github.repository }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME#*/}/"
          MESSAGE="✅ CI合格！
🏛️ ${REPO_NAME}
📝 ${SHORT_SHA}: ${COMMIT_MSG}
🌐 アプリ: ${PAGES_URL}"
          curl -s -X POST "https://api.line.me/v2/bot/message/push" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -d "$(jq -n \
              --arg to "$LINE_USER_ID" \
              --arg text "$MESSAGE" \
              '{to: $to, messages: [{type: "text", text: $text}]}')"

      # 8. LINE通知（失敗時）
      - name: LINE通知（失敗）
        if: failure()
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          REPO_NAME="${{ github.repository }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME#*/}/"
          MESSAGE="🔴 CI不合格！
🏛️ ${REPO_NAME}
📝 ${SHORT_SHA}: ${COMMIT_MSG}
🔍 詳細: ${{ github.server_url }}/${{ github.repository }}/actions
🌐 アプリ: ${PAGES_URL}"
          curl -s -X POST "https://api.line.me/v2/bot/message/push" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -d "$(jq -n \
              --arg to "$LINE_USER_ID" \
              --arg text "$MESSAGE" \
              '{to: $to, messages: [{type: "text", text: $text}]}')"
