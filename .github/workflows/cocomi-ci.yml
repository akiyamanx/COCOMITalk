# COCOMI CI - COCOMITalk品質チェック
# v1.6 - 2026-03-27 500行制限を段階制に変更（500⚠️警告/550❌エラー）＋ESLint導入（警告のみ）

name: COCOMI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 0. Node.jsセットアップ（ESLint用）
      - name: Node.jsセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. 行数制限チェック（段階制: 500⚠️警告 / 550❌エラー）
      - name: 行数制限チェック（段階制）
        run: |
          echo "=== 行数制限チェック（段階制） ==="
          echo "  500行超え → ⚠️ 警告（CIは通す）"
          echo "  550行超え → ❌ エラー（CIを落とす）"
          echo ""
          HARD_FAIL=0
          SOFT_WARN=0
          for file in $(find . -name "*.js" -o -name "*.html" -o -name "*.css" | grep -v node_modules | grep -v .github); do
            LINES=$(wc -l < "$file")
            if [ "$LINES" -gt 550 ]; then
              echo "❌ $file: ${LINES}行（550行超過 — 分割必須！）"
              HARD_FAIL=1
            elif [ "$LINES" -gt 500 ]; then
              echo "⚠️ $file: ${LINES}行（500行超過 — 分割を検討してね）"
              SOFT_WARN=1
            else
              echo "✅ $file: ${LINES}行"
            fi
          done
          if [ "$HARD_FAIL" -eq 1 ]; then
            echo ""
            echo "::error::550行を超えるファイルがあります。分割してください。"
            exit 1
          fi
          if [ "$SOFT_WARN" -eq 1 ]; then
            echo ""
            echo "::warning::500行を超えるファイルがあります。次の機能追加時に分割を検討してください。"
          fi
          echo ""
          echo "✅ 行数制限チェック完了"

      # 2. JS構文チェック（node --check）
      - name: JS構文チェック
        run: |
          echo "=== JS構文チェック ==="
          ERROR=0
          for f in *.js prompts/*.js; do
            if ! node --check "$f" 2>&1; then
              ERROR=1
            fi
          done
          if [ "$ERROR" -ne 0 ]; then
            echo "❌ JS構文エラーが見つかりました"
            exit 1
          fi
          echo "✅ 全JSファイル構文OK"

      # 3. ESLint品質チェック（警告のみ・CIは落とさない）
      - name: ESLint品質チェック
        run: |
          echo "=== ESLint品質チェック ==="
          npm install --no-save eslint@8 2>/dev/null
          if [ -f ".eslintrc.json" ]; then
            npx eslint "*.js" "prompts/*.js" --max-warnings 999 2>&1 || true
          else
            echo "⚠️ .eslintrc.json が見つかりません（ESLintスキップ）"
          fi
          echo ""
          echo "📝 ESLintは現在警告のみモードです（CIは落としません）"

      # 4. グローバルクラス定義チェック（grep）
      - name: グローバルクラス定義チェック
        run: |
          echo "=== グローバルクラス定義チェック ==="
          ERROR=0
          for cls in VoiceCommand WebSpeechProvider AudioPlaybackManager VoiceUI; do
            if ! grep -q "window\.${cls} = " *.js; then
              echo "❌ ${cls} がグローバル定義されていません"
              ERROR=1
            fi
          done
          if [ "$ERROR" -ne 0 ]; then
            echo "❌ 必須クラスの定義が不足しています"
            exit 1
          fi
          echo "✅ 全クラス定義OK"

      # 5. 先頭コメントチェック
      - name: 先頭コメントチェック
        run: |
          echo "=== 先頭コメントチェック ==="
          for file in $(find . -name "*.js" | grep -v node_modules | grep -v .github | grep -v sw.js); do
            HEAD=$(head -5 "$file")
            if echo "$HEAD" | grep -qE "(このファイルは|COCOMITalk)"; then
              echo "✅ $file"
            else
              echo "⚠️ $file: 先頭に日本語コメントがありません"
            fi
          done

      # 6. バージョン番号チェック
      - name: バージョン番号チェック
        run: |
          echo "=== バージョン番号チェック ==="
          for file in $(find . -name "*.js" | grep -v node_modules | grep -v .github | grep -v sw.js); do
            if grep -qE "v[0-9]+\.[0-9]+" "$file"; then
              VER=$(grep -oE "v[0-9]+\.[0-9]+" "$file" | head -1)
              echo "✅ $file: $VER"
            else
              echo "⚠️ $file: バージョン番号が見つかりません"
            fi
          done

      # 7. console.log検出（警告のみ・CIは落とさない）
      - name: console.log検出
        run: |
          echo "=== console.log検出（情報のみ） ==="
          COUNT=0
          for file in $(find . -name "*.js" | grep -v node_modules | grep -v .github); do
            LOGS=$(grep -c "console\.log" "$file" 2>/dev/null || echo 0)
            if [ "$LOGS" -gt 0 ]; then
              echo "📝 $file: console.log ${LOGS}件"
              COUNT=$((COUNT + LOGS))
            fi
          done
          echo "合計: ${COUNT}件（開発中のため警告のみ）"

      # 8. TODO/FIXME検出
      - name: TODO/FIXME検出
        run: |
          echo "=== TODO/FIXME検出 ==="
          grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.js" --include="*.html" --include="*.css" . --exclude-dir=node_modules --exclude-dir=.github || echo "✅ TODO/FIXMEなし"

      # 9. ファイル行数サマリー
      - name: ファイル行数サマリー
        run: |
          echo "=== ファイル行数サマリー ==="
          TOTAL=0
          for file in $(find . -name "*.js" -o -name "*.html" -o -name "*.css" | grep -v node_modules | grep -v .github | sort); do
            LINES=$(wc -l < "$file")
            printf "  %4d行  %s\n" "$LINES" "$file"
            TOTAL=$((TOTAL + LINES))
          done
          echo "合計: ${TOTAL}行"

      # 10. LINE通知（成功時）
      - name: LINE通知（成功）
        if: success()
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          REPO="${{ github.repository }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          MSG="${{ github.event.head_commit.message }}"
          URL="https://${{ github.repository_owner }}.github.io/${REPO#*/}/"
          TEXT="CI合格! ${REPO} ${SHA}: ${MSG} アプリ: ${URL}"
          curl -s -X POST "https://api.line.me/v2/bot/message/push" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -d "{\"to\":\"${LINE_USER_ID}\",\"messages\":[{\"type\":\"text\",\"text\":\"${TEXT}\"}]}"

      # 11. LINE通知（失敗時）
      - name: LINE通知（失敗）
        if: failure()
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          REPO="${{ github.repository }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          MSG="${{ github.event.head_commit.message }}"
          ACTIONS_URL="${{ github.server_url }}/${{ github.repository }}/actions"
          TEXT="CI不合格! ${REPO} ${SHA}: ${MSG} 詳細: ${ACTIONS_URL}"
          curl -s -X POST "https://api.line.me/v2/bot/message/push" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -d "{\"to\":\"${LINE_USER_ID}\",\"messages\":[{\"type\":\"text\",\"text\":\"${TEXT}\"}]}"
